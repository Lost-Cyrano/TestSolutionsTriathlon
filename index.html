<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Carte Interactive - Parcours</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        #map {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #e8eaed;
        }

        .top-bar {
            position: fixed;
            top: clamp(12px, 2vh, 20px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: clamp(8px, 1.5vh, 14px) clamp(12px, 2vw, 20px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.5vw, 16px);
            width: min(95%, 600px);
            min-height: 48px;
        }

        .top-bar select {
            flex: 1;
            padding: clamp(8px, 1.2vh, 12px) clamp(10px, 1.5vw, 16px);
            border: 2px solid #e8eaed;
            border-radius: 10px;
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            font-weight: 500;
            font-family: inherit;
            background: white;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 40px;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 36px;
        }

        .top-bar select:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
        }

        .top-bar select option {
            padding: 8px;
        }

        .top-bar .badge {
            font-size: clamp(0.65rem, 1vw, 0.85rem);
            font-weight: 600;
            color: #5f6368;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .top-bar .badge .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .bottom-bar {
            position: fixed;
            bottom: clamp(20px, 5vh, 40px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: min(90%, 500px);
        }

        .share-btn {
            padding: clamp(14px, 2vh, 20px) clamp(24px, 4vw, 48px);
            border: none;
            border-radius: 50px;
            font-size: clamp(0.9rem, 1.6vw, 1.2rem);
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
            white-space: nowrap;
            min-height: 56px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #25D366;
            color: white;
            cursor: not-allowed;
            box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
            pointer-events: none;
            opacity: 0.6;
        }

        .share-btn.active {
            cursor: pointer;
            pointer-events: all;
            opacity: 1;
            box-shadow: 0 4px 24px rgba(37, 211, 102, 0.5);
        }

        .share-btn.active:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 32px rgba(37, 211, 102, 0.6);
        }

        .share-btn.active:active {
            transform: scale(0.97);
        }

        .share-btn .icon {
            font-size: clamp(1.1rem, 1.8vw, 1.4rem);
        }

        .click-hint {
            position: fixed;
            top: clamp(80px, 12vh, 120px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            font-weight: 500;
            z-index: 1000;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            animation: fadeInOut 3s ease-in-out forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        .custom-marker {
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .share-marker {
            background: #1a73e8;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.5);
        }

        .leaflet-routing-container {
            display: none !important;
        }

        .leaflet-routing-alternatives-container {
            display: none !important;
        }

        @media (max-width: 600px) {
            .top-bar {
                top: 8px;
                padding: 6px 10px;
                width: 98%;
                border-radius: 12px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .top-bar select {
                font-size: 0.75rem;
                min-height: 36px;
                padding: 6px 30px 6px 10px;
                background-size: 14px;
                background-position: right 8px center;
            }
            .top-bar .badge {
                font-size: 0.6rem;
            }
            .top-bar .badge .dot {
                width: 8px;
                height: 8px;
            }
            .bottom-bar {
                bottom: clamp(12px, 3vh, 20px);
                width: 95%;
                gap: 8px;
            }
            .share-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
                min-height: 44px;
                border-radius: 30px;
            }
            .share-btn .icon {
                font-size: 0.9rem;
            }
            .click-hint {
                top: clamp(70px, 10vh, 90px);
                padding: 5px 14px;
                font-size: 0.65rem;
                white-space: normal;
                max-width: 90%;
            }
        }

        @media (max-width: 400px) {
            .top-bar {
                padding: 4px 8px;
                border-radius: 10px;
            }
            .top-bar select {
                font-size: 0.65rem;
                min-height: 32px;
                padding: 4px 28px 4px 8px;
                background-size: 12px;
                background-position: right 6px center;
            }
            .top-bar .badge {
                font-size: 0.55rem;
            }
            .top-bar .badge .dot {
                width: 6px;
                height: 6px;
            }
            .bottom-bar {
                bottom: 8px;
                gap: 6px;
            }
            .share-btn {
                padding: 8px 12px;
                font-size: 0.7rem;
                min-height: 38px;
                border-radius: 25px;
            }
            .share-btn .icon {
                font-size: 0.8rem;
            }
            .click-hint {
                top: clamp(60px, 8vh, 80px);
                padding: 4px 10px;
                font-size: 0.55rem;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .top-bar {
                top: 6px;
                padding: 4px 10px;
                width: 90%;
                border-radius: 10px;
            }
            .top-bar select {
                font-size: 0.7rem;
                min-height: 30px;
                padding: 4px 28px 4px 8px;
                background-size: 12px;
                background-position: right 6px center;
            }
            .top-bar .badge {
                font-size: 0.6rem;
            }
            .top-bar .badge .dot {
                width: 6px;
                height: 6px;
            }
            .bottom-bar {
                bottom: 8px;
                gap: 6px;
                width: 80%;
            }
            .share-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
                min-height: 34px;
                border-radius: 25px;
            }
            .share-btn .icon {
                font-size: 0.75rem;
            }
            .click-hint {
                top: clamp(50px, 8vh, 70px);
                padding: 4px 10px;
                font-size: 0.55rem;
            }
        }

        @media (prefers-color-scheme: dark) {
            #map {
                background: #1a1a2e;
            }
            .top-bar {
                background: rgba(30, 30, 50, 0.95);
                border-color: rgba(255, 255, 255, 0.1);
            }
            .top-bar select {
                background: #252540;
                border-color: #3a3a55;
                color: #e8eaed;
            }
            .top-bar select:focus {
                border-color: #4a8af4;
                box-shadow: 0 0 0 3px rgba(74, 138, 244, 0.3);
            }
            .top-bar select option {
                background: #252540;
                color: #e8eaed;
            }
            .top-bar .badge {
                color: #9aa0a6;
            }
            .share-btn {
                background: #25D366;
                box-shadow: 0 4px 24px rgba(37, 211, 102, 0.2);
            }
            .share-btn.active {
                box-shadow: 0 4px 24px rgba(37, 211, 102, 0.4);
            }
            .share-btn.active:hover {
                box-shadow: 0 6px 32px rgba(37, 211, 102, 0.5);
            }
            .custom-marker {
                border-color: #1a1a2e;
            }
            .share-marker {
                border-color: #1a1a2e;
            }
        }

        .leaflet-control-attribution {
            font-size: 9px !important;
            opacity: 0.6;
        }

        .leaflet-routing-icon {
            display: none !important;
        }

        .user-location {
            font-size: 18px;
            filter: drop-shadow(0 0 4px rgba(26, 115, 232, 0.6));
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="top-bar" id="topBar">
        <div class="badge">
            <span class="dot" id="colorDot" style="background:#1a73e8;"></span>
            <span id="routeName">Parcours</span>
        </div>
        <select id="routeSelector">
            <option value="">Charger un parcours...</option>
        </select>
    </div>

    <div class="click-hint">👆 Cliquez sur la carte pour placer un point</div>

    <div class="bottom-bar">
        <button class="share-btn" id="shareBtn">
            <span class="icon">📤</span>
            <span>Partager par SMS</span>
        </button>
    </div>

    <script>
        const map = L.map('map', {
            center: [44.5639, 6.4951],
            zoom: 13,
            zoomControl: true,
            fadeAnimation: true,
            attributionControl: true
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let waypointMarkers = [];
        let shareMarker = null;
        let currentShareLat = null;
        let currentShareLng = null;
        let currentAddress = '';
        let routingControl = null;
        let userLocationMarker = null;
        let routePolyline = null;
        let routeSelectors = [];
        let currentRouteIndex = -1;
        let currentRouteData = null;

        const shareBtn = document.getElementById('shareBtn');
        const routeSelector = document.getElementById('routeSelector');
        const colorDot = document.getElementById('colorDot');
        const routeName = document.getElementById('routeName');

        const colors = [
            '#FF6B35', '#4CAF50', '#9C27B0', '#00BCD4', '#FF4081',
            '#FFC107', '#3F51B5', '#FF5722', '#8BC34A', '#E91E63',
            '#2196F3', '#FF9800', '#795548', '#607D8B', '#673AB7'
        ];

        function getColor(index) {
            return colors[index % colors.length];
        }

        function getAddress(lat, lng) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=fr`;
            return fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data && data.display_name) {
                        return data.display_name;
                    }
                    return 'Adresse non trouvée';
                })
                .catch(() => {
                    return 'Adresse non disponible';
                });
        }

        function createWaypointMarker(number, color) {
            const div = document.createElement('div');
            div.className = 'custom-marker';
            div.style.background = color || '#ff6b35';
            div.textContent = number;
            return L.divIcon({
                html: div,
                className: '',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
        }

        function createShareMarker() {
            const div = document.createElement('div');
            div.className = 'share-marker';
            div.textContent = '📌';
            return L.divIcon({
                html: div,
                className: '',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
        }

        function clearRoute() {
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }
            if (routePolyline) {
                map.removeLayer(routePolyline);
                routePolyline = null;
            }
            waypointMarkers.forEach(m => map.removeLayer(m));
            waypointMarkers = [];
        }

        function displayRoute(routeData, color) {
            clearRoute();
            
            if (!routeData || !routeData.waypoints || routeData.waypoints.length < 2) {
                return;
            }

            currentRouteData = routeData;
            const pts = routeData.waypoints.sort((a, b) => a.number - b.number);

            pts.forEach((w, index) => {
                const marker = L.marker([w.lat, w.lng], {
                    icon: createWaypointMarker(w.number, color),
                    draggable: false
                }).addTo(map);
                waypointMarkers.push(marker);
            });

            // Utiliser le routing machine pour générer l'itinéraire sur les routes
            const latlngs = pts.map(w => L.latLng(w.lat, w.lng));
            
            // Créer le contrôle de routing pour avoir le tracé sur les routes
            routingControl = L.Routing.control({
                waypoints: latlngs,
                routeWhileDragging: false,
                show: false,
                addWaypoints: false,
                fitSelectedRoutes: false,
                showAlternatives: false,
                lineOptions: {
                    styles: [{ 
                        color: color || '#ff6b35', 
                        weight: 5, 
                        opacity: 0.9
                    }]
                },
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://router.project-osrm.org/route/v1/'
                }),
                createMarker: function() { return null; }
            }).addTo(map);

            // Quand la route est trouvée, on récupère le tracé complet
            routingControl.on('routesfound', function(e) {
                const route = e.routes[0];
                if (route && route.coordinates) {
                    // Supprimer la ligne droite si elle existe
                    if (routePolyline) {
                        map.removeLayer(routePolyline);
                        routePolyline = null;
                    }
                    // Ajouter le tracé de l'itinéraire
                    routePolyline = L.polyline(route.coordinates, {
                        color: color || '#ff6b35',
                        weight: 5,
                        opacity: 0.9
                    }).addTo(map);
                }
            });

            // Ajuster la vue pour voir tout le parcours
            const bounds = L.latLngBounds(latlngs);
            map.fitBounds(bounds, { padding: [50, 50] });

            shareBtn.classList.add('active');
            colorDot.style.background = color || '#ff6b35';
            
            const name = routeData.name || 'Parcours';
            routeName.textContent = name;
        }

        function loadParcoursFromJSON() {
            fetch('./parcours.json')
                .then(response => response.json())
                .then(data => {
                    // Vider le sélecteur (garder l'option par défaut)
                    while (routeSelector.options.length > 1) {
                        routeSelector.remove(1);
                    }
                    routeSelectors = [];

                    // Vérifier si c'est un tableau (format du fichier fourni)
                    if (Array.isArray(data)) {
                        data.forEach((item, index) => {
                            if (item.name && item.fichier && item.fichier.waypoints) {
                                const routeData = {
                                    name: item.name,
                                    waypoints: item.fichier.waypoints,
                                    timestamp: item.fichier.timestamp
                                };
                                const color = getColor(index);
                                const selectorIndex = routeSelectors.length;
                                routeSelectors.push({ 
                                    name: routeData.name, 
                                    color: color, 
                                    data: routeData
                                });
                                addRouteToSelector(routeData.name, color, selectorIndex);
                            }
                        });
                    } 
                    // Sinon, vérifier si c'est un objet unique
                    else if (data && data.type === 'parcours' && data.waypoints) {
                        const routeData = {
                            name: 'Parcours principal',
                            waypoints: data.waypoints,
                            timestamp: data.timestamp
                        };
                        const color = getColor(0);
                        routeSelectors.push({ 
                            name: routeData.name, 
                            color: color, 
                            data: routeData
                        });
                        addRouteToSelector(routeData.name, color, 0);
                    }
                    
                    // Afficher le premier parcours par défaut
                    if (routeSelectors.length > 0) {
                        routeSelector.value = 0;
                        const first = routeSelectors[0];
                        displayRoute(first.data, first.color);
                        currentRouteIndex = 0;
                    }
                })
                .catch(err => {
                    console.warn('Erreur chargement parcours:', err);
                    // Tentative de chargement depuis le fichier local si disponible
                    fetch('parcours.json')
                        .then(response => response.json())
                        .then(localData => {
                            if (Array.isArray(localData)) {
                                localData.forEach((item, index) => {
                                    if (item.name && item.fichier && item.fichier.waypoints) {
                                        const routeData = {
                                            name: item.name,
                                            waypoints: item.fichier.waypoints,
                                            timestamp: item.fichier.timestamp
                                        };
                                        const color = getColor(index);
                                        routeSelectors.push({ 
                                            name: routeData.name, 
                                            color: color, 
                                            data: routeData
                                        });
                                        addRouteToSelector(routeData.name, color, routeSelectors.length - 1);
                                    }
                                });
                                if (routeSelectors.length > 0) {
                                    routeSelector.value = 0;
                                    const first = routeSelectors[0];
                                    displayRoute(first.data, first.color);
                                    currentRouteIndex = 0;
                                }
                            }
                        })
                        .catch(() => {});
                });
        }

        function addRouteToSelector(name, color, index) {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = name;
            option.style.color = color;
            routeSelector.appendChild(option);
        }

        routeSelector.addEventListener('change', function() {
            const index = parseInt(this.value);
            if (!isNaN(index) && index >= 0 && index < routeSelectors.length) {
                const selected = routeSelectors[index];
                displayRoute(selected.data, selected.color);
                currentRouteIndex = index;
            }
        });

        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            if (shareMarker) {
                map.removeLayer(shareMarker);
                shareMarker = null;
            }
            
            shareMarker = L.marker([lat, lng], {
                icon: createShareMarker(),
                draggable: false
            }).addTo(map);

            currentShareLat = lat;
            currentShareLng = lng;
            shareBtn.classList.add('active');

            getAddress(lat, lng).then(address => {
                currentAddress = address;
            });
        });

        shareBtn.addEventListener('click', function() {
            if (currentShareLat === null || currentShareLng === null) {
                return;
            }

            const coords = `${currentShareLat.toFixed(6)}, ${currentShareLng.toFixed(6)}`;
            const mapsLink = `https://www.openstreetmap.org/?mlat=${currentShareLat}&mlon=${currentShareLng}&zoom=16`;
            
            let message = `L'organisation vous partage la coordonnée suivante :\n\n- Lien : ${mapsLink}\n- Adresse : ${currentAddress}\n- Coordonnée : ${coords}`;
            
            if (currentRouteIndex >= 0 && routeSelectors[currentRouteIndex]) {
                const route = routeSelectors[currentRouteIndex];
                message += `\n\nParcours actuel : ${route.name}`;
                if (route.data && route.data.waypoints) {
                    message += `\nNombre de points : ${route.data.waypoints.length}`;
                }
            }
            
            const phoneNumber = '33781450856';
            const encodedMessage = encodeURIComponent(message);
            const smsUrl = `sms:${phoneNumber}?body=${encodedMessage}`;
            
            window.open(smsUrl, '_blank');
        });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    map.setView([lat, lng], 13);
                    
                    const userIcon = L.divIcon({
                        html: '📍',
                        iconSize: [24, 24],
                        className: 'user-location',
                        iconAnchor: [12, 12]
                    });
                    
                    userLocationMarker = L.marker([lat, lng], {
                        icon: userIcon,
                        draggable: false
                    }).addTo(map);
                },
                () => {
                    map.setView([44.5639, 6.4951], 13);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        } else {
            map.setView([44.5639, 6.4951], 13);
        }

        loadParcoursFromJSON();

        document.querySelector('.leaflet-control-zoom').style.zIndex = '999';
    </script>
</body>
</html>
