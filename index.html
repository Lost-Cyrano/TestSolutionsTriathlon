<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Carte Interactive</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        #map {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #e8eaed;
        }

        .share-btn {
            position: fixed;
            bottom: clamp(20px, 5vh, 40px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            padding: clamp(14px, 2vh, 20px) clamp(24px, 4vw, 48px);
            background: #25D366;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: clamp(0.9rem, 1.6vw, 1.2rem);
            font-weight: 600;
            cursor: not-allowed;
            box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
            white-space: nowrap;
            min-height: 56px;
            min-width: 220px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0.6;
        }

        .share-btn.active {
            cursor: pointer;
            pointer-events: all;
            opacity: 1;
            box-shadow: 0 4px 24px rgba(37, 211, 102, 0.5);
        }

        .share-btn.active:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 32px rgba(37, 211, 102, 0.6);
        }

        .share-btn.active:active {
            transform: translateX(-50%) scale(0.95);
        }

        .share-btn .icon {
            font-size: clamp(1.1rem, 1.8vw, 1.4rem);
        }

        .click-hint {
            position: fixed;
            top: clamp(20px, 4vh, 40px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: clamp(0.75rem, 1.2vw, 1rem);
            font-weight: 500;
            z-index: 1000;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            animation: fadeInOut 3s ease-in-out forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        @media (max-width: 600px) {
            .share-btn {
                bottom: clamp(16px, 4vh, 30px);
                padding: 12px 20px;
                font-size: 0.85rem;
                min-height: 48px;
                min-width: 180px;
                gap: 8px;
                border-radius: 40px;
            }
            .share-btn .icon {
                font-size: 1rem;
            }
            .click-hint {
                top: 12px;
                padding: 6px 16px;
                font-size: 0.7rem;
                white-space: normal;
                max-width: 90%;
            }
        }

        @media (max-width: 400px) {
            .share-btn {
                bottom: 12px;
                padding: 10px 16px;
                font-size: 0.75rem;
                min-height: 44px;
                min-width: 150px;
                gap: 6px;
                border-radius: 30px;
            }
            .share-btn .icon {
                font-size: 0.85rem;
            }
            .click-hint {
                top: 8px;
                padding: 5px 12px;
                font-size: 0.6rem;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .share-btn {
                bottom: 12px;
                padding: 8px 16px;
                font-size: 0.75rem;
                min-height: 38px;
                min-width: 140px;
                gap: 6px;
            }
            .share-btn .icon {
                font-size: 0.8rem;
            }
            .click-hint {
                top: 8px;
                padding: 4px 12px;
                font-size: 0.6rem;
            }
        }

        @media (prefers-color-scheme: dark) {
            #map {
                background: #1a1a2e;
            }
            .share-btn {
                background: #25D366;
                box-shadow: 0 4px 24px rgba(37, 211, 102, 0.2);
            }
            .share-btn.active {
                box-shadow: 0 4px 24px rgba(37, 211, 102, 0.4);
            }
            .share-btn.active:hover {
                box-shadow: 0 6px 32px rgba(37, 211, 102, 0.5);
            }
        }

        .leaflet-control-attribution {
            font-size: 9px !important;
            opacity: 0.6;
        }

        .leaflet-popup-content {
            font-size: 13px;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="click-hint">👆 Cliquez sur la carte pour placer un point</div>

    <button class="share-btn" id="shareBtn">
        <span class="icon">📤</span>
        <span>Partager par SMS</span>
    </button>

    <script>
        const map = L.map('map', {
            center: [44.5639, 6.4951],
            zoom: 15,
            zoomControl: true,
            fadeAnimation: true,
            attributionControl: true
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let marker = null;
        let currentLat = null;
        let currentLng = null;
        let currentAddress = '';
        let pointPlaced = false;

        const shareBtn = document.getElementById('shareBtn');

        function getAddress(lat, lng) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=fr`;

            return fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data && data.display_name) {
                        return data.display_name;
                    }
                    return 'Adresse non trouvée';
                })
                .catch(() => {
                    return 'Adresse non disponible';
                });
        }

        function placeMarker(lat, lng) {
            if (marker) {
                map.removeLayer(marker);
            }

            marker = L.marker([lat, lng], {
                draggable: true
            }).addTo(map);

            currentLat = lat;
            currentLng = lng;
            pointPlaced = true;

            shareBtn.classList.add('active');

            marker.on('dragend', function(e) {
                const pos = marker.getLatLng();
                placeMarker(pos.lat, pos.lng);
            });

            getAddress(lat, lng).then(address => {
                currentAddress = address;
            });
        }

        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            placeMarker(lat, lng);
        });

        shareBtn.addEventListener('click', function() {
            if (!pointPlaced || currentLat === null || currentLng === null) {
                return;
            }

            const coords = `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
            const mapsLink = `https://www.openstreetmap.org/?mlat=${currentLat}&mlon=${currentLng}&zoom=16`;
            const message = `L'organisation vous partage la coordonnée suivante :\n\n- Lien pour ouvrir la coordonnée : ${mapsLink}\n- Adresse du point : ${currentAddress}\n- Coordonnée exacte : ${coords}`;
            
            const phoneNumber = '33781450856';
            const encodedMessage = encodeURIComponent(message);
            const smsUrl = `sms:${phoneNumber}?body=${encodedMessage}`;
            
            window.open(smsUrl, '_blank');
        });

        document.querySelector('.leaflet-control-zoom').style.zIndex = '999';
    </script>
</body>
</html>
